<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 210" fill="none" role="img" aria-label="Peak XV Partners">
  <defs>
    <!-- Ring 2 lower portion drawn on top → creates interlock effect -->
    <clipPath id="r2front">
      <rect x="0" y="100" width="215" height="120"/>
    </clipPath>
  </defs>

  <!-- Ring 2 (lower-left) — back layer -->
  <path fill="#6B3CC8" fill-rule="evenodd"
    d="M34 88 h52 a24 24 0 0 1 24 24 v52 a24 24 0 0 1 -24 24 h-52 a24 24 0 0 1 -24 -24 v-52 a24 24 0 0 1 24 -24 z
       M58 112 h4 a14 14 0 0 1 14 14 v4 a14 14 0 0 1 -14 14 h-4 a14 14 0 0 1 -14 -14 v-4 a14 14 0 0 1 14 -14 z"/>

  <!-- Ring 1 (upper-right) — front layer -->
  <path fill="#6B3CC8" fill-rule="evenodd"
    d="M112 10 h52 a24 24 0 0 1 24 24 v52 a24 24 0 0 1 -24 24 h-52 a24 24 0 0 1 -24 -24 v-52 a24 24 0 0 1 24 -24 z
       M136 34 h4 a14 14 0 0 1 14 14 v4 a14 14 0 0 1 -14 14 h-4 a14 14 0 0 1 -14 -14 v-4 a14 14 0 0 1 14 -14 z"/>

  <!-- Ring 2 redrawn (lower portion only) → in front of Ring 1 for interlock -->
  <path fill="#6B3CC8" fill-rule="evenodd" clip-path="url(#r2front)"
    d="M34 88 h52 a24 24 0 0 1 24 24 v52 a24 24 0 0 1 -24 24 h-52 a24 24 0 0 1 -24 -24 v-52 a24 24 0 0 1 24 -24 z
       M58 112 h4 a14 14 0 0 1 14 14 v4 a14 14 0 0 1 -14 14 h-4 a14 14 0 0 1 -14 -14 v-4 a14 14 0 0 1 14 -14 z"/>

  <!-- Wordmark: "peak xv" -->
  <text x="210" y="152"
    font-family="'Arial Black','Arial',sans-serif"
    font-size="118" font-weight="900"
    letter-spacing="-3" fill="#0d0d0d">peak xv</text>

  <!-- Wordmark: "PARTNERS" -->
  <text x="818" y="198" text-anchor="end"
    font-family="'Arial','Helvetica',sans-serif"
    font-size="43" font-weight="700"
    letter-spacing="8" fill="#0d0d0d">PARTNERS</text>
</svg>
